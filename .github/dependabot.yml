version: 2
updates:
  # Dependencias de npm (devDependencies, principalmente SortableJS)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - chore
    commit-message:
      prefix: chore
      include: scope

  # Acciones de GitHub usadas en CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope